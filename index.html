<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshRide Booking</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>FreshRide Booking</h1>
    <p>Velg en ledig tid</p>
  </div>

  <div class="card">
    <input type="date" id="date" />
    <button onclick="load()">Hent tider</button>
  </div>

  <div id="list"></div>

  <div class="card hidden" id="form">
    <h3>Bekreft booking</h3>

    <input id="name" placeholder="Navn" />
    <input id="phone" placeholder="Mobilnummer" inputmode="numeric"/>

    <button onclick="book()">Bekreft booking</button>

    <div class="success hidden" id="success">
      <b>Din time er booket</b>
      <p>Husk å levere bilen før oppgitt tidspunkt.</p>
      <p>Ved spørsmål ring Freshride 12345678</p>
    </div>
  </div>

</div>

<script>
let selected = null;
let events = [];

async function load() {
  const date = document.getElementById("date").value;
  if (!date) return;

  const res = await fetch(`/.netlify/functions/get-slots?date=${date}`);
  const data = await res.json();

  events = data.events;
  render();
}

function render() {
  const el = document.getElementById("list");
  el.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "event";

    const start = new Date(e.start).toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"});
    const end = new Date(e.end).toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"});

    div.innerHTML = `
      <div class="time">${start} - ${end}</div>
      <div class="tag">Ledig</div>
    `;

    div.onclick = () => {
      selected = e;
      document.getElementById("form").classList.remove("hidden");
    };

    el.appendChild(div);
  });
}

async function book() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.replace(/\D/g,'');

  if (!name || !phone) return alert("Fyll inn alt");

  await fetch("/.netlify/functions/book-slot", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      eventId: selected.id,
      name,
      phone
    })
  });

  document.getElementById("success").classList.remove("hidden");
  load();
}
</script>

</body>
</html>
