<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshRide Booking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #slots {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
    }

    button:hover {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

  <h1>FreshRide booking</h1>

  <input type="date" id="datePicker" />
  <button onclick="update()">Hent tider</button>

  <div id="slots"></div>

  <script>
    async function loadSlots(date) {
      const res = await fetch(`/.netlify/functions/get-slots?date=${date}`);
      const data = await res.json();
      renderSlots(data.slots || []);
    }

    function update() {
      const date = document.getElementById("datePicker").value;
      if (!date) return;

      loadSlots(date);
    }

    function renderSlots(slots) {
      const el = document.getElementById("slots");
      el.innerHTML = "";

      slots.forEach(slot => {
        const btn = document.createElement("button");

        btn.innerText = new Date(slot.start).toLocaleTimeString("no-NO", {
          hour: "2-digit",
          minute: "2-digit"
        });

        btn.onclick = async () => {
          await fetch("/.netlify/functions/book-slot", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              start: slot.start,
              end: slot.end,
              title: "Vask"
            })
          });

          alert("Booket!");
          update();
        };

        el.appendChild(btn);
      });
    }
  </script>

</body>
</html>
