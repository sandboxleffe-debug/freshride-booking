<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshRide Booking</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>FreshRide Booking</h1>

  <div class="card">
    <input type="date" id="date" />
    <button onclick="load()">Hent tider</button>
  </div>

  <div id="list"></div>

  <div class="card" id="form" style="display:none;">
    <h3>Bekreft booking (3 timer)</h3>

    <input id="name" placeholder="Navn" />
    <input id="phone" placeholder="Mobil" />

    <button onclick="book()">Book</button>
  </div>

</div>

<script>
let selected = null;
let events = [];

async function load() {
  const date = document.getElementById("date").value;
  if (!date) return;

  const res = await fetch(`/.netlify/functions/get-slots?date=${date}`);
  const data = await res.json();

  events = data.events;
  render();
}

function render() {
  const el = document.getElementById("list");
  el.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "event";

    const start = new Date(e.start.dateTime).toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"});
    const end = new Date(e.end.dateTime).toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"});

    div.innerHTML = `
      <div class="time">${start} - ${end}</div>
      <div class="title">${e.summary || "Ledig"}</div>
    `;

    div.onclick = () => {
      selected = e;
      document.getElementById("form").style.display = "block";
    };

    el.appendChild(div);
  });
}

async function book() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if (!name || !phone) return alert("Fyll inn alt");

  await fetch("/.netlify/functions/book-slot", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      start: selected.start.dateTime,
      name,
      phone
    })
  });

  alert("Booket!");
  load();
}
</script>

</body>
</html>
