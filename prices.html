<style>
  /* .fr-main's shared rule zeroes out Bootstrap's own container gutter (padding: Xrem 0 Yrem),
     which most other pages don't notice because their content sits inside a .fr-panel that
     supplies its own padding. This page's grid/text sit directly in <main>, so without this
     the price cards and intro text run edge-to-edge on mobile with no side margin at all. */
  .fr-main { padding: 1.25rem 0.75rem 4rem; }
  .fr-prices-intro { text-align: center; color: var(--fr-text-dark-zone-faint); font-size: 0.9rem; max-width: 32rem; margin: 0 auto 1.25rem; }
  .fr-price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }

  /* Flip cards — tap anywhere to flip, like turning over a playing card. The
     badge sits on the outer (unclipped, non-rotating) .fr-price-card so it
     stays put and never gets cut off by either face's rounded-corner clip,
     regardless of flip state. */
  .fr-price-card {
    position: relative;
    perspective: 1400px;
    cursor: pointer;
  }
  .fr-price-card-flipper {
    position: relative;
    height: 306px;
    transition: transform 0.65s cubic-bezier(0.4, 0.15, 0.15, 1);
    transform-style: preserve-3d;
  }
  .fr-price-card.is-flipped .fr-price-card-flipper { transform: rotateY(180deg); }
  .fr-price-card-face {
    position: absolute; inset: 0;
    border-radius: var(--fr-radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    padding: 1.3rem 1.1rem 1rem;
  }
  .fr-price-card-face > * { position: relative; z-index: 1; }
  .fr-price-card-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 1;
    background: linear-gradient(90deg, var(--fr-gold-bright), var(--fr-gold), var(--fr-gold-deep));
  }

  /* Front — light surface, warm gold wash bleeding from the corner */
  .fr-price-card-front {
    background: linear-gradient(155deg, var(--fr-panel-bg) 55%, var(--fr-gold-soft) 150%);
    border: 1px solid var(--fr-panel-border);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .fr-price-card:hover .fr-price-card-front { border-color: var(--fr-gold); box-shadow: 0 14px 30px -18px rgba(232,185,35,0.5); }
  .fr-price-card-bgicon {
    position: absolute; top: -1.1rem; right: -1.4rem; z-index: 0;
    width: 6.5rem; height: 6.5rem;
    color: var(--fr-gold);
    opacity: 0.1;
    pointer-events: none;
  }
  @keyframes fr-icon-glow {
    0%, 100% { box-shadow: 0 6px 16px -6px rgba(232,185,35,0.55); }
    50% { box-shadow: 0 8px 22px -4px rgba(232,185,35,0.85); }
  }
  .fr-price-card-icon {
    width: 68px; height: 68px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--fr-gold-soft);
    border-radius: 50%;
    color: var(--fr-gold-deep);
    margin-bottom: 0.55rem;
    animation: fr-icon-glow 3s ease-in-out infinite;
  }
  .fr-price-card-icon svg { width: 32px; height: 32px; }
  .fr-price-card-title { font-family: var(--font-display); font-weight: 700; font-size: 1.15rem; color: var(--fr-panel-text); margin: 0; }
  .fr-price-card-desc--front { font-size: 0.8rem; color: var(--fr-panel-text-faint); margin: 0.3rem 0 0; line-height: 1.4; }
  .fr-price-card-value { margin-top: 0.6rem; font-family: var(--font-display); font-weight: 700; font-size: 1.55rem; color: var(--fr-gold-deep); }
  .fr-price-card-value.fr-price-tba { font-size: 0.95rem; font-family: var(--font-body); font-weight: 600; color: var(--fr-panel-text-faint); }
  .fr-price-card-flip-hint {
    margin-top: auto; padding-top: 0.6rem;
    font-size: 0.72rem; font-weight: 600; color: var(--fr-panel-text-faint);
    display: flex; align-items: center; gap: 0.3rem;
  }

  /* Back — colors flipped: dark surface, gold text, gold-filled icon */
  .fr-price-card-back {
    background: linear-gradient(155deg, var(--fr-black) 55%, #241d10 150%);
    border: 1px solid rgba(232,185,35,0.35);
    transform: rotateY(180deg);
    justify-content: center;
  }
  .fr-price-card-back .fr-price-card-icon {
    width: 48px; height: 48px;
    background: var(--fr-gold);
    color: var(--fr-black);
    box-shadow: none;
    margin-bottom: 0.4rem;
    animation: none;
  }
  .fr-price-card-back .fr-price-card-icon svg { width: 22px; height: 22px; }
  .fr-price-card-back .fr-price-card-title { color: var(--fr-text-dark-zone); font-size: 1.05rem; }
  .fr-price-card-desc--back { font-size: 0.84rem; color: var(--fr-text-dark-zone-soft); margin: 0.4rem 0 0; line-height: 1.45; }
  .fr-price-card-back .fr-price-card-value { color: var(--fr-gold-bright); font-size: 1.2rem; margin-top: 0.5rem; }
  .fr-price-card-book-btn {
    margin-top: 0.7rem;
    background: var(--fr-gold); color: var(--fr-black);
    font-weight: 700; font-size: 0.85rem;
    padding: 0.5rem 1.1rem; border-radius: 999px;
    text-decoration: none;
    box-shadow: 0 4px 14px -4px rgba(232,185,35,0.6);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .fr-price-card-book-btn:hover { background: var(--fr-gold-bright); }
  .fr-price-card-book-btn:active { transform: scale(0.97); }
  .fr-price-card-back .fr-price-card-flip-hint { color: var(--fr-text-dark-zone-faint); margin-top: 0.5rem; padding-top: 0; }

  /* Premium tier — a touch more exclusive: gold-gradient icon, subtle glow border, small badge.
     margin-top on the outer card gives the badge (which pokes up above it) guaranteed
     clearance from whatever card sits above it in the grid. */
  .fr-price-card--premium { margin-top: 0.9rem; }
  .fr-price-card--premium .fr-price-card-front {
    border: 1px solid var(--fr-gold);
    box-shadow: 0 0 0 1px var(--fr-gold-soft), 0 10px 28px -10px rgba(232, 185, 35, 0.45);
  }
  .fr-price-card--premium .fr-price-card-front .fr-price-card-icon {
    background: linear-gradient(135deg, var(--fr-gold-bright), var(--fr-gold-deep));
    color: var(--fr-black);
    box-shadow: 0 0 0 3px var(--fr-gold-soft);
  }
  .fr-price-card--premium .fr-price-card-back { border-color: var(--fr-gold); }
  .fr-price-card--premium .fr-price-card-back .fr-price-card-icon { background: linear-gradient(135deg, var(--fr-gold-bright), var(--fr-gold-deep)); }
  .fr-price-card--premium-badge {
    position: absolute; top: -0.6rem; left: 50%; transform: translateX(-50%); z-index: 3;
    background: linear-gradient(135deg, var(--fr-gold-bright), var(--fr-gold-deep));
    color: var(--fr-black);
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 0.25rem 0.7rem; border-radius: 999px;
    box-shadow: 0 2px 8px -2px rgba(0,0,0,0.4);
    white-space: nowrap;
    pointer-events: none;
  }
  .fr-price-updated { font-size: 0.85rem; color: var(--fr-text-dark-zone-faint); text-align: center; margin: 0; }
  .fr-price-state { text-align: center; color: var(--fr-text-dark-zone-faint); }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="nav-rail.js"></script>
<script>
document.getElementById("year").textContent = new Date().getFullYear();

const NO_MONTHS = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

const PRICE_ICONS = {
  droplet: '<path d="M12 2.5C10 5.3 6 10.6 6 14.2a6 6 0 0 0 12 0c0-3.6-4-8.9-6-11.7Z"/>',
  car: '<path fill-rule="evenodd" d="M5.6 5.5A2 2 0 0 1 7.5 4h9a2 2 0 0 1 1.9 1.5L19.8 11H21a2 2 0 0 1 2 2v4a1 1 0 0 1-1 1h-1.1a2.5 2.5 0 0 1-4.9 0H8a2.5 2.5 0 0 1-4.9 0H2a1 1 0 0 1-1-1v-4a2 2 0 0 1 2-2h1.2L5.6 5.5ZM6.2 10h11.6l-1.3-4H7.5l-1.3 4ZM6 16a1 1 0 1 0 0 2 1 1 0 0 0 0-2Zm12 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z" clip-rule="evenodd"/>',
  diamond: '<path d="M7 3h10l5 6-10 13L2 9Z"/><path d="M2 9h20M7 3l5 6 5-6M12 9v13" stroke="rgba(0,0,0,0.28)" stroke-width="0.6" fill="none"/>',
  shield: '<path fill-rule="evenodd" d="M12 1.5 4 4.7V11c0 5.6 3.4 9.9 8 11.5 4.6-1.6 8-5.9 8-11.5V4.7L12 1.5Zm-1.3 14.3L6.8 12l1.4-1.4 2.5 2.5 5-5L17.1 9.5l-6.4 6.3Z" clip-rule="evenodd"/>',
  sparkle: '<path d="M11 2h2v9h9v2h-9v9h-2v-9H2v-2h9V2Z"/>',
};

function iconForLabel(label) {
  const l = (label || "").toLowerCase();
  if (l.includes("premium")) return PRICE_ICONS.diamond;
  if (l.includes("interior+") || l.includes("interior +")) return PRICE_ICONS.sparkle;
  if (l.includes("complete")) return PRICE_ICONS.shield;
  if (l.includes("exterior")) return PRICE_ICONS.car;
  return PRICE_ICONS.droplet;
}

async function loadPrices() {
  const grid = document.getElementById("pricesGrid");
  try {
    const res = await fetch("/api/content?type=services");
    const data = await res.json();
    const services = data.services || [];
    if (!services.length) {
      grid.innerHTML = '<p class="fr-price-state">Ingen priser er registrert ennå.</p>';
      return;
    }

    grid.innerHTML = services.map(s => {
      const isPremium = (s.label || "").toLowerCase().includes("premium");
      const priceText = s.price_nok != null ? `kr ${Number(s.price_nok).toLocaleString('no-NO')}` : 'Ta kontakt';
      const priceClass = s.price_nok == null ? ' fr-price-tba' : '';
      return `
      <div class="fr-price-card${isPremium ? ' fr-price-card--premium' : ''}" onclick="this.classList.toggle('is-flipped')">
        ${isPremium ? '<span class="fr-price-card--premium-badge">Eksklusiv</span>' : ''}
        <div class="fr-price-card-flipper">
          <div class="fr-price-card-face fr-price-card-front">
            <span class="fr-price-card-accent"></span>
            <svg class="fr-price-card-bgicon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">${iconForLabel(s.label)}</svg>
            <div class="fr-price-card-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">${iconForLabel(s.label)}</svg>
            </div>
            <h3 class="fr-price-card-title">${s.label}</h3>
            ${s.description ? `<p class="fr-price-card-desc--front">${s.description}</p>` : ''}
            <div class="fr-price-card-value${priceClass}">${priceText}</div>
            <div class="fr-price-card-flip-hint">↻ Trykk for mer info</div>
          </div>
          <div class="fr-price-card-face fr-price-card-back">
            <div class="fr-price-card-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">${iconForLabel(s.label)}</svg>
            </div>
            <h3 class="fr-price-card-title">${s.label}</h3>
            ${(s.long_description || s.description) ? `<p class="fr-price-card-desc--back">${s.long_description || s.description}</p>` : ''}
            <div class="fr-price-card-value${priceClass}">${priceText}</div>
            <a href="index.html#step-date" class="fr-price-card-book-btn" onclick="event.stopPropagation()">📅 Book denne</a>
            <div class="fr-price-card-flip-hint">↻ Trykk for å snu tilbake</div>
          </div>
        </div>
      </div>
    `;
    }).join('');

    if (data.updatedAt) {
      const d = new Date(data.updatedAt);
      document.getElementById("pricesUpdated").textContent = `Priser gjeldende fra ${NO_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    }
  } catch (e) {
    grid.innerHTML = '<p class="fr-price-state">Klarte ikke å hente priser akkurat nå.</p>';
  }
}
loadPrices();
</script>
