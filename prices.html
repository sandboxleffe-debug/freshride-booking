<style>
  .fr-price-list { display: flex; flex-direction: column; gap: 1rem; }
  .fr-price-row { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--fr-panel-border); }
  .fr-price-row:last-child { border-bottom: none; padding-bottom: 0; }
  .fr-price-row-label { font-weight: 700; color: var(--fr-panel-text); font-size: 1.02rem; }
  .fr-price-row-desc { font-size: 0.85rem; color: var(--fr-panel-text-faint); margin-top: 0.2rem; }
  .fr-price-row-value { font-weight: 700; color: var(--fr-gold-deep); white-space: nowrap; font-family: var(--font-display); font-size: 1.1rem; flex-shrink: 0; }
  .fr-price-updated { font-size: 0.85rem; color: var(--fr-panel-text-faint); margin-top: 1.5rem; text-align: center; }
</style>

<body>

</nav>

    <span class="fr-offcanvas-brand"><span class="fr-brand-fresh">Fresh</span><span class="fr-brand-ride">Ride</span></span>

<header class="fr-hero-copy">
  <div class="container">
    <p class="fr-eyebrow">FRESHRIDE</p>
    <h1 class="fr-hero-title">Priser</h1>
  </div>
</header>

<main class="container fr-main">
  <section class="fr-panel">
    <div id="pricesBody" class="fr-prose">
      <div class="spinner-border fr-spinner" role="status"></div>
    </div>
  </section>
</main>

<footer class="fr-footer">
  <div class="container">
    <span>© <span id="year"></span> FreshRide</span>
    <span class="fr-footer-dot">·</span>
    <span>Oftebroveien 29, Lyngdal</span>
    <span class="fr-footer-dot">·</span>
    <a href="tel:92133900">921 33 900</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("year").textContent = new Date().getFullYear();

const NO_MONTHS = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

async function loadPrices() {
  const body = document.getElementById("pricesBody");
  try {
    const res = await fetch("/api/content?type=services");
    const data = await res.json();
    const services = data.services || [];
    if (!services.length) {
      body.innerHTML = '<p>Ingen priser er registrert ennå.</p>';
      return;
    }

    const rows = services.map(s => `
      <div class="fr-price-row">
        <div>
          <div class="fr-price-row-label">${s.label}</div>
          ${s.description ? `<div class="fr-price-row-desc">${s.description}</div>` : ''}
        </div>
        <div class="fr-price-row-value">${s.price_nok != null ? `kr ${Number(s.price_nok).toLocaleString('no-NO')}` : 'Ta kontakt'}</div>
      </div>
    `).join('');

    let updatedLabel = '';
    if (data.updatedAt) {
      const d = new Date(data.updatedAt);
      updatedLabel = `<p class="fr-price-updated">Priser gjeldende fra ${NO_MONTHS[d.getMonth()]} ${d.getFullYear()}</p>`;
    }

    body.innerHTML = `<div class="fr-price-list">${rows}</div>${updatedLabel}`;
  } catch (e) {
    body.innerHTML = '<p>Klarte ikke å hente priser akkurat nå.</p>';
  }
}
loadPrices();
</script>
</body>
</html>
